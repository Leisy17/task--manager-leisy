<!DOCTYPE html>
<html>
    <head>
        <title>Tablero</title>
        <link rel="stylesheet" href="cards/cards.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <meta charset="UTF-8">
    </head>
    <body>

        <div class="container">
            
            <div class="card mb-16">

                <div class="line pending"></div>
                <div class="card-header">
                    <h1>Maquetación de Header</h1>
                </div>
                <div class="card-body">
                    <p>
                        Definir estructura flexible para
                        navegación principal.                    
                    </p>
                </div>
                <div class="card-footer">
                    <button class="btn-task primary">Avanzar</button>
                </div>
            </div>

            <div class="card mb-16">

                <div class="line progress"></div>
                <div class="card-header">
                    <h1>Maquetación de Header</h1>
                </div>
                <div class="card-body">
                    <p>
                        Definir estructura flexible para
                        navegación principal.                    
                    </p>
                </div>
                <div class="card-footer">
                    <button class="btn-task return">Regresar</button>
                    <button class="btn-task success">Finalizar</button>
                </div>
            </div>
            
            <div class="card mb-16">

                <div class="line done"></div>
                <div class="card-header">
                    <h1>Maquetación de Header</h1>
                </div>
                <div class="card-body">
                    <p>
                        Definir estructura flexible para
                        navegación principal.                    
                    </p>
                </div>
                <div class="card-footer">
                    <!--<button class="btn-task success">Exitoso</button>-->
                </div>
            </div>            

        </div>

        
    </body>
</html>
